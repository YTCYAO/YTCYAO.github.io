<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YYT Community - Home</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 1rem 2rem;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      color: #fff;
      text-decoration: none;
    }

    .logo h1 {
      font-size: 1.3rem;
      font-weight: 600;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
    }

    .nav-links a {
      color: rgba(255, 255, 255, 0.8);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: #fff;
    }

    /* Auth buttons */
    .auth-buttons {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .auth-btn {
      padding: 0.5rem 1.2rem;
      border: none;
      border-radius: 25px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
    }

    .login-btn {
      background: transparent;
      color: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .login-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .register-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }

    .register-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .logout-btn {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .logout-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .post-btn {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: #fff;
    }

    .post-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      color: #fff;
      font-weight: 500;
    }

    /* Auth Modal */
    .auth-modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .auth-modal-overlay.show {
      display: flex;
    }

    .auth-modal {
      background: #fff;
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
      overflow: hidden;
      animation: modalFadeIn 0.3s ease-out;
    }

    .auth-modal-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 1.5rem;
      color: #fff;
      text-align: center;
    }

    .auth-modal-header h2 {
      margin: 0;
      font-size: 1.5rem;
    }

    .auth-modal-body {
      padding: 1.5rem;
    }

    .auth-form-group {
      margin-bottom: 1rem;
    }

    .auth-form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #333;
    }

    .auth-form-group input {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    .auth-form-group input:focus {
      outline: none;
      border-color: #667eea;
    }

    .auth-modal-footer {
      padding: 0 1.5rem 1.5rem;
    }

    .auth-submit-btn {
      width: 100%;
      padding: 0.8rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .auth-submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .auth-switch {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #666;
    }

    .auth-switch button {
      background: none;
      border: none;
      color: #667eea;
      cursor: pointer;
      text-decoration: underline;
    }

    .auth-switch button:hover {
      color: #764ba2;
    }

    /* Post Modal */
    .post-modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .post-modal-overlay.show {
      display: flex;
    }

    .post-modal {
      background: #fff;
      border-radius: 20px;
      width: 100%;
      max-width: 500px;
      overflow: hidden;
      animation: modalFadeIn 0.3s ease-out;
    }

    .post-modal-header {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      padding: 1.5rem;
      color: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .post-modal-header h2 {
      margin: 0;
      font-size: 1.5rem;
    }

    .post-modal-close {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: #fff;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
    }

    .post-modal-body {
      padding: 1.5rem;
    }

    .post-form-group {
      margin-bottom: 1rem;
    }

    .post-form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #333;
    }

    .post-form-group input,
    .post-form-group textarea,
    .post-form-group select {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    .post-form-group input:focus,
    .post-form-group textarea:focus,
    .post-form-group select:focus {
      outline: none;
      border-color: #10b981;
    }

    .post-form-group textarea {
      height: 120px;
      resize: vertical;
    }

    .post-modal-footer {
      padding: 0 1.5rem 1.5rem;
    }

    .post-submit-btn {
      width: 100%;
      padding: 0.8rem;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .post-submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      padding: 1rem 2rem;
      border-radius: 10px;
      font-size: 0.9rem;
      z-index: 3000;
      opacity: 0;
      transition: all 0.3s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.error {
      background: rgba(239, 68, 68, 0.9);
    }

    .toast.success {
      background: rgba(34, 197, 94, 0.9);
    }

    /* Search bar */
    .search-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem 2rem;
    }

    .search-box {
      display: flex;
      gap: 0.5rem;
      max-width: 600px;
      margin: 0 auto;
    }

    .search-input {
      flex: 1;
      padding: 0.8rem 1.2rem;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .search-btn {
      padding: 0.8rem 1.5rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .search-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .search-results {
      text-align: center;
      color: #666;
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }

    /* Main content */
    .main-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem 2rem;
    }

    /* Hero section */
    .hero-section {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 20px;
      padding: 3rem;
      margin-bottom: 2rem;
      color: #fff;
      text-align: center;
      box-shadow: 0 10px 40px rgba(102, 126, 234, 0.3);
    }

    .hero-title {
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      margin-bottom: 1rem;
    }

    .hero-subtitle {
      font-size: 1.1rem;
      opacity: 0.9;
      margin-bottom: 1.5rem;
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 3rem;
      flex-wrap: wrap;
    }

    .stat-item {
      text-align: center;
    }

    .stat-number {
      font-size: 2rem;
      font-weight: bold;
    }

    .stat-label {
      font-size: 0.9rem;
      opacity: 0.8;
    }

    /* Category tags */
    .category-tags {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .tag {
      padding: 0.5rem 1.2rem;
      background: #fff;
      border-radius: 25px;
      border: 1px solid #e0e0e0;
      color: #666;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tag:hover {
      background: #667eea;
      color: #fff;
      border-color: #667eea;
    }

    .tag.active {
      background: #667eea;
      color: #fff;
      border-color: #667eea;
    }

    /* Posts section */
    .posts-section {
      margin-bottom: 2rem;
    }

    .section-title {
      font-size: 1.5rem;
      color: #1a1a2e;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Posts grid */
    .posts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }

    /* Post card */
    .post-card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }

    .post-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
    }

    .post-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .post-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .post-content {
      padding: 1.2rem;
    }

    .post-category {
      display: inline-block;
      padding: 0.3rem 0.8rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: #667eea;
      background: rgba(102, 126, 234, 0.1);
      border-radius: 20px;
      margin-bottom: 0.8rem;
    }

    .post-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 0.5rem;
      line-height: 1.4;
    }

    .post-excerpt {
      font-size: 0.9rem;
      color: #666;
      line-height: 1.5;
      margin-bottom: 1rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .post-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: #999;
    }

    .post-author {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .author-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 0.7rem;
      font-weight: bold;
    }

    /* Post Detail Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      overflow-y: auto;
    }

    .modal-overlay.show {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem;
    }

    .modal-content {
      background: #fff;
      border-radius: 20px;
      max-width: 800px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: modalFadeIn 0.3s ease-out;
    }

    @keyframes modalFadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .modal-header {
      position: relative;
    }

    .modal-image {
      width: 100%;
      height: 250px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .modal-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.5);
      color: #fff;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .modal-close:hover {
      background: rgba(0, 0, 0, 0.7);
    }

    .modal-body {
      padding: 2rem;
    }

    .modal-category {
      display: inline-block;
      padding: 0.3rem 0.8rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: #667eea;
      background: rgba(102, 126, 234, 0.1);
      border-radius: 20px;
      margin-bottom: 1rem;
    }

    .modal-title {
      font-size: 1.8rem;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 1rem;
      line-height: 1.4;
    }

    .modal-author {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #eee;
    }

    .modal-author-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 0.9rem;
      font-weight: bold;
    }

    .modal-author-info {
      display: flex;
      flex-direction: column;
    }

    .modal-author-name {
      font-weight: 600;
      color: #1a1a2e;
    }

    .modal-date {
      font-size: 0.85rem;
      color: #999;
    }

    .modal-text {
      font-size: 1rem;
      line-height: 1.8;
      color: #333;
    }

    .modal-text h3 {
      color: #1a1a2e;
      margin: 1.5rem 0 1rem;
      font-size: 1.3rem;
    }

    .modal-text h4 {
      color: #333;
      margin: 1rem 0 0.5rem;
      font-size: 1.1rem;
    }

    .modal-text ul, .modal-text ol {
      margin: 1rem 0;
      padding-left: 1.5rem;
    }

    .modal-text li {
      margin-bottom: 0.5rem;
    }

    .modal-text code {
      background: #f0f0f0;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-family: monospace;
    }

    .modal-text blockquote {
      border-left: 4px solid #667eea;
      padding-left: 1rem;
      margin: 1rem 0;
      color: #666;
      font-style: italic;
    }

    /* Footer */
    footer {
      background: #1a1a2e;
      color: rgba(255, 255, 255, 0.7);
      padding: 2rem;
      text-align: center;
      margin-top: 3rem;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 1rem;
    }

    .footer-links a {
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      font-size: 0.9rem;
    }

    .footer-links a:hover {
      color: #fff;
    }

    /* Responsive */
    @media (max-width: 768px) {
      header { padding: 1rem; }
      .nav-links { gap: 1rem; }
      .main-content { padding: 1rem; }
      .hero-section { padding: 2rem 1rem; }
      .hero-stats { gap: 2rem; }
      .modal-overlay.show { padding: 1rem; }
      .modal-body { padding: 1.5rem; }
      .modal-title { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <a href="home.html" class="logo">
        <h1>YYT Flight</h1>
      </a>
      <nav class="nav-links">
        <a href="#">首页</a>
        <a href="#">帖子</a>
        <a href="#">教程</a>
        <a href="#">社区</a>
        <a href="flight_sim.html">模拟器</a>
      </nav>
      <div class="auth-buttons">
        <button id="loginBtn" class="auth-btn login-btn">登录</button>
        <button id="registerBtn" class="auth-btn register-btn">注册</button>
        <div id="userInfo" class="user-info" style="display: none;">
          <span id="userName"></span>
          <button id="logoutBtn" class="auth-btn logout-btn">退出</button>
        </div>
        <button id="postBtn" class="auth-btn post-btn" style="display: none;">发布帖子</button>
      </div>
    </div>
  </header>

  <div class="search-container">
    <div class="search-box">
      <input type="text" class="search-input" id="searchInput" placeholder="搜索帖子关键词...">
      <button class="search-btn" id="searchBtn">搜索</button>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>

  <main class="main-content">
    <section class="hero-section">
      <h2 class="hero-title">欢迎来到模拟飞行社区</h2>
      <p class="hero-subtitle">与全球飞行爱好者分享你的飞行经验和技巧</p>
      <div class="hero-stats">
        <div class="stat-item">
          <div class="stat-number">12,580</div>
          <div class="stat-label">活跃用户</div>
        </div>
        <div class="stat-item">
          <div class="stat-number">8,920</div>
          <div class="stat-label">精彩帖子</div>
        </div>
        <div class="stat-item">
          <div class="stat-number">500+</div>
          <div class="stat-label">飞行教程</div>
        </div>
      </div>
    </section>

    <div class="category-tags">
      <span class="tag active">全部</span>
      <span class="tag">飞行技巧</span>
      <span class="tag">机型评测</span>
      <span class="tag">航线分享</span>
      <span class="tag">插件推荐</span>
      <span class="tag">新手入门</span>
      <span class="tag">精彩截图</span>
    </div>

    <section class="posts-section">
      <h3 class="section-title">📝 最新帖子</h3>
      <div class="posts-grid" id="postsGrid">
      </div>
    </section>
  </main>

  <!-- Post Detail Modal -->
  <div class="modal-overlay" id="postModal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-image" id="modalImage">✈️</div>
        <button class="modal-close" id="modalClose">×</button>
      </div>
      <div class="modal-body">
        <span class="modal-category" id="modalCategory">类别</span>
        <h2 class="modal-title" id="modalTitle">标题</h2>
        <div class="modal-author">
          <div class="modal-author-avatar" id="modalAuthorAvatar">A</div>
          <div class="modal-author-info">
            <span class="modal-author-name" id="modalAuthor">作者</span>
            <span class="modal-date" id="modalDate">日期</span>
          </div>
        </div>
        <div class="modal-text" id="modalContent"></div>
      </div>
    </div>
  </div>

  <!-- Auth Modal -->
  <div class="auth-modal-overlay" id="authModal">
    <div class="auth-modal">
      <div class="auth-modal-header">
        <h2 id="authModalTitle">登录</h2>
      </div>
      <div class="auth-modal-body">
        <form id="authForm">
          <div class="auth-form-group">
            <label for="authUsername">用户名</label>
            <input type="text" id="authUsername" placeholder="请输入用户名" required>

          <p>ILS（仪表着陆系统）是飞机在低能见度条件下进行精密进近和着陆的关键设备。</p>

          <h3>ILS系统组成</h3>
          <ul>
            <li><strong>LOC (Localizer)：</strong>航向道，提供水平引导</li>
            <li><strong>GS (Glideslope)：</strong>下滑道，提供垂直引导</li>
            <li><strong>MB (Marker Beacons)：</strong>距离标记点</li>
            <li><strong>RA (Receiver)：</strong>机载接收设备</li>
          </ul>

          <h3>工作原理</h3>
          <p>ILS通过地面发射台发射特定频率的信号，飞机上的接收器解码这些信号并显示在仪表上。</p>

          <h4>航向道 (LOC)</h4>
          <p>航向道信号呈扇形发射，覆盖跑道中心线两侧各10度。</p>

          <h4>下滑道 (GS)</h4>
          <p>下滑道信号形成一个约3度的下滑角，引导飞机以正确的角度下降。</p>

          <h3>仪表指示</h3>
          <p>在驾驶舱中，ILS信息显示在HSI（水平状态指示器）上：</p>
          <ul>
            <li>水平指针：显示偏离航向道的情况</li>
            <li>垂直指针：显示偏离下滑道的情况</li>
            <li>CDI刻度：显示偏离程度</li>
          </ul>

          <h3>ILS进近步骤</h3>

            <li>在指定频率调谐ILS</li>

      document.getElementById('postModal').classList.remove('show');
      document.body.style.overflow = '';
    }

    document.getElementById('modalClose').addEventListener('click', closeModal);
    
    document.getElementById('postModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('postModal')) {
        closeModal();

    });

        closeModal();
      }
    });

    function toggleAuthMode() {
      isLoginMode = !isLoginMode;
      if (isLoginMode) {
        authModalTitle.textContent = '登录';
        authSubmitBtn.textContent = '登录';
        authSwitch.innerHTML = '还没有账号？<button id="toggleAuthMode">立即注册</button>';

        authModalTitle.textContent = '注册';

        authSwitch.innerHTML = '已有账号？<button id="toggleAuthMode">立即登录</button>';
        phoneGroup.style.display = 'block';

      // Re-add event listener for toggle button
      document.getElementById('toggleAuthMode').addEventListener('click', toggleAuthMode);
    }

    // Open auth modal
    function openAuthModal(mode = 'login') {
      isLoginMode = mode === 'login';
      if (!isLoginMode) {
        toggleAuthMode();
      }
      authModal.classList.add('show');
      document.body.style.overflow = 'hidden';
    }

    // Close auth modal

      authModal.classList.remove('show');
      document.body.style.overflow = '';
      authForm.reset();
    }

    // Handle login
    function handleLogin(username, password) {
      const user = users.find(u => u.username === username && u.password === password);
      if (user) {
        currentUser = user;
        updateUI();
        closeAuthModal();
        showToast(`欢迎回来，${user.username}！`, 'success');
      } else {
        showToast('用户名或密码错误', 'error');
      }
    }

    // Handle register
    function handleRegister(username, phone, password) {
      if (users.find(u => u.username === username)) {
        showToast('用户名已存在', 'error');
        return;
      }
      if (users.find(u => u.phone === phone)) {
        showToast('手机号已被注册', 'error');
        return;
      }
      const newUser = {
        username,
        phone,
        password,
        avatar: username.charAt(0).toUpperCase()
      };
      users.push(newUser);
      showToast('注册成功，请登录', 'success');
      toggleAuthMode();
      authForm.reset();
    }

    // Update UI based on login status
    function updateUI() {
      if (currentUser) {
        loginBtn.style.display = 'none';
        registerBtn.style.display = 'none';
        userInfo.style.display = 'flex';
        postBtn.style.display = 'block';
        userName.textContent = currentUser.username;
      } else {
        loginBtn.style.display = 'block';
        registerBtn.style.display = 'block';
        userInfo.style.display = 'none';
        postBtn.style.display = 'none';
      }
    }

    authSubmitBtn.addEventListener('click', () => {

      const password = document.getElementById('authPassword').value;
      
      if (!username || !password) {
        showToast('请填写用户名和密码', 'error');
        return;
      }

      if (isLoginMode) {
        handleLogin(username, password);
      } else {
        const phone = document.getElementById('authPhone').value.trim();
        if (!phone) {
          showToast('请填写手机号', 'error');
          return;
        }
        if (!/^1[3-9]\d{9}$/.test(phone)) {
          showToast('请输入正确的手机号', 'error');
          return;
        }
        handleRegister(username, phone, password);
      }
    });

    // Event listeners for auth buttons
    loginBtn.addEventListener('click', () => openAuthModal('login'));
    registerBtn.addEventListener('click', () => openAuthModal('register'));
    toggleAuthModeBtn.addEventListener('click', toggleAuthMode);

    // Close auth modal when clicking outside
    authModal.addEventListener('click', (e) => {
      if (e.target === authModal) {
        closeAuthModal();
      }
    });

    // Logout
    logoutBtn.addEventListener('click', () => {
      currentUser = null;
      updateUI();
      showToast('已退出登录', 'info');
    });

    // Open new post modal
    postBtn.addEventListener('click', () => {
      if (!currentUser) {
        showToast('请先登录', 'error');
        return;
      }
      newPostModal.classList.add('show');
      document.body.style.overflow = 'hidden';
    });

    // Close new post modal
    function closeNewPostModal() {
      newPostModal.classList.remove('show');
      document.body.style.overflow = '';
      document.getElementById('newPostForm').reset();
    }

    newPostClose.addEventListener('click', closeNewPostModal);

    newPostModal.addEventListener('click', (e) => {
      if (e.target === newPostModal) {
        closeNewPostModal();
      }
    });

    // Submit new post
    newPostSubmit.addEventListener('click', () => {
      if (!currentUser) {
        showToast('请先登录', 'error');
        return;
      }

      const title = document.getElementById('postTitle').value.trim();
      const category = document.getElementById('postCategory').value;
      const excerpt = document.getElementById('postExcerpt').value.trim();
      const content = document.getElementById('postContent').value.trim();

      if (!title || !category || !excerpt || !content) {
        showToast('请填写所有字段', 'error');
        return;
      }

      const newPost = {
        id: posts.length + 1,
        title,
        excerpt,
        category,
        author: currentUser.username,
        authorInitial: currentUser.avatar,
        image: 'https://neeko-copilot.bytedance.net/api/text2image?prompt=Airplane%20flying%20in%20blue%20sky%20professional%20aviation%20photography&size=800x600',
        date: '刚刚',
        content: `<p>${content}</p>`
      };

      posts.unshift(newPost);
      renderPosts(posts);
      closeNewPostModal();
      showToast('帖子发布成功！', 'success');
    });

    // Close modals with Escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeModal();
        closeAuthModal();
        closeNewPostModal();
      }
    });

    // Search functionality
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const searchResults = document.getElementById('searchResults');

    function performSearch() {
      const keyword = searchInput.value.trim().toLowerCase();
      
      if (!keyword) {
        searchResults.textContent = '';
        renderPosts(posts);
        return;
      }

      const filteredPosts = posts.filter(post => {
        // Search in title
        if (post.title.toLowerCase().includes(keyword)) return true;
        // Search in excerpt
        if (post.excerpt.toLowerCase().includes(keyword)) return true;
        // Search in keywords
        if (post.keywords && post.keywords.some(k => k.toLowerCase().includes(keyword))) return true;
        // Search in category
        if (post.category.toLowerCase().includes(keyword)) return true;
        // Search in author
        if (post.author.toLowerCase().includes(keyword)) return true;
        return false;
      });

      if (filteredPosts.length > 0) {
        searchResults.textContent = `找到 ${filteredPosts.length} 个相关帖子`;
        renderPosts(filteredPosts);
      } else {
        searchResults.textContent = `没有找到包含 "${keyword}" 的帖子`;
        renderPosts([]);
      }
    }

    searchBtn.addEventListener('click', performSearch);
    
    searchInput.addEventListener('keyup', (e) => {
      if (e.key === 'Enter') {
        performSearch();
      }
    });
  </script>
</body>
</html>
